<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upload File</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #151c2e;
  padding: 30px;
  border-radius: 12px;
  width: 380px;
  text-align: center;
  border: 1px solid #27324d;
}

h2 {
  margin-bottom: 20px;
  font-size: 20px;
}

input[type="file"] {
  width: 100%;
  margin: 15px 0;
  padding: 10px;
  background: #0b0f1a;
  border: 1px solid #2a3550;
  color: #fff;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #00c8ff, #7b61ff);
  border: none;
  color: #000;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

.note {
  margin-top: 10px;
  font-size: 12px;
  color: #8aa0c8;
}
</style>
</head>

<body>

<div class="container">
  <h2>Upload File to S3</h2>

  <form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required />
    <button type="submit">Upload</button>
  </form>

  <div class="note">
    Files will be stored in S3 with auto date-based folders.
  </div>
</div>

</body>
</html>
